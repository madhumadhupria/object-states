<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Object States — 3D Interaction Language</title>
    <link rel="stylesheet" href="./styles/main.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <script>
      if (location.protocol === "file:") {
        document.body.innerHTML =
          '<main style="font:16px/1.5 system-ui,sans-serif;max-width:36rem;margin:3rem auto;padding:0 1rem">' +
          "<h1>Object States</h1>" +
          "<p>This page must be served over HTTP (ES modules do not work from <code>file://</code>).</p>" +
          "<p>From the project folder, run:</p>" +
          "<pre style;background:#eee;padding:1rem;border-radius:6px">python3 -m http.server 5173</pre>" +
          "<p>Then open <a href=\"http://localhost:5173/\">http://localhost:5173/</a></p>" +
          "</main>";
      }
    </script>
    <main id="stage" aria-label="3D scene"></main>

    <button
      type="button"
      class="color-toggle"
      data-color-toggle
      aria-pressed="false"
      aria-label="Toggle color mode"
    >
      <span class="color-toggle__swatches" aria-hidden="true">
        <span style="background:#b85c5c"></span>
        <span style="background:#4a7c7e"></span>
        <span style="background:#c9a96e"></span>
        <span style="background:#6e8b6f"></span>
      </span>
      <span class="color-toggle__label">Color</span>
      <span class="color-toggle__switch" aria-hidden="true">
        <span class="color-toggle__thumb"></span>
      </span>
    </button>

    <script type="module" src="./js/main.js"></script>
  </body>
</html>
