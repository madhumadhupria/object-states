<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Object States — 3D Interaction Language</title>
    <link rel="stylesheet" href="./styles/main.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <main id="stage" aria-label="3D scene"></main>

    <button
      type="button"
      class="color-toggle"
      data-color-toggle
      aria-pressed="false"
      aria-label="Toggle color mode"
    >
      <span class="color-toggle__swatches" aria-hidden="true">
        <span style="background:#b85c5c"></span>
        <span style="background:#4a7c7e"></span>
        <span style="background:#c9a96e"></span>
        <span style="background:#6e8b6f"></span>
      </span>
      <span class="color-toggle__label">Color</span>
      <span class="color-toggle__switch" aria-hidden="true">
        <span class="color-toggle__thumb"></span>
      </span>
    </button>

    <script type="module" src="./js/main.js"></script>
  </body>
</html>
